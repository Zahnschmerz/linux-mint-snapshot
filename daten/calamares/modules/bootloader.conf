---
efiBootLoader: "grub"
kernel: "/vmlinuz"
img: "/initrd.img"
timeout: "10"
grubInstall: "grub-install"
grubMkconfig: "grub-mkconfig"
grubCfg: "/boot/grub/grub.cfg"
grubProbe: "grub-probe"
efiBootMgr: "efibootmgr"
installEFIFallback: true
# Neuen GRUB in den STANDARD-Slot /EFI/ubuntu schreiben (wie der echte Mint-/Ubuntu-
# Installer), NICHT in einen eigenen /EFI/LinuxMint-Slot. Grund: Auf Rechnern mit
# alten Linux-Resten existiert oft schon ein Firmware-Boot-Eintrag "ubuntu", der auf
# /EFI/ubuntu zeigt. Ein eigener LinuxMint-Slot bekommt dann keinen Firmware-Eintrag
# und wird nie gebootet -> es startet der ALTE ubuntu-GRUB mit veralteter Kennung ->
# "grub>". Mit "ubuntu" ueberschreiben wir den alten GRUB mit der KORREKTEN Kennung
# und nutzen den vorhandenen Firmware-Eintrag weiter.
efiBootloaderId: "ubuntu"
