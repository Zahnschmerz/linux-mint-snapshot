# Räumt NUR die Live-Stick-Reste aus dem frisch kopierten Zielsystem.
# 1:1-Klon-Prinzip: Konten, Autologin und alle Einstellungen bleiben unangetastet!
# Entfernt wird ausschließlich, was zum Live-Betrieb gehört:
# - das "System installieren"-Symbol (Benutzer-Vorlage skel + alle Schreibtische)
# - die Live-Autologin-Zusatzdatei (falls sie je den Weg ins Ziel findet)
---
dontChroot: false
timeout: 60
script:
    # 2026-07-14 Fix Login-Schleife (ohne Home): fehlendes /home/<User> aus /etc/skel
    # anlegen. Via SEPARATES Skript, weil Calamares $-Variablen im shellprocess selbst
    # als eigene Template-Variablen missversteht (sonst scheitert die Installation).
    - "-/usr/local/sbin/rikus-mintshot-home-fix"
    # WLAN/LAN von der Hardware-Bindung loesen (netplan "match:"), damit das gespeicherte
    # Passwort auch auf fremder Hardware greift (Karte heisst dort anders).
    - "-/usr/local/sbin/rikus-mintshot-netzfix"
    # os-prober einschalten -> daneben installiertes Windows kommt ins GRUB-Menue.
    # WICHTIG: laeuft VOR dem grubcfg-Modul (update-grub) in der Sequenz.
    - "-/usr/local/sbin/rikus-mintshot-dualboot"
    - "-rm -f /etc/lightdm/lightdm.conf.d/99-live-autologin.conf"
    - "-rm -f /etc/skel/Desktop/system-installieren.desktop /etc/skel/Desktop/refractainstaller.desktop"
    - "-sh -c 'rm -f /home/*/Desktop/system-installieren.desktop /home/*/Schreibtisch/system-installieren.desktop'"
