# Calamares-Einstellungen für Linux-Mint-Snapshot-Live-Systeme  [lms-config-v5]
# (gehört zur App "Linux Mint Snapshot", Herausgeber Gilbert Rikus)
#
# v5 = 1:1-KLON-INSTALLATION (Gilberts Modell, wie der MX-Installer):
# Der Installer übernimmt das Abbild unverändert — Konten, Einstellungen,
# Autologin, Sprache, Tastatur: alles bleibt exakt wie im Schnappschuss.
# Er richtet NUR das maschinenspezifische Nötigste ein: Zielplatte,
# Dateisystem-Tabelle, Maschinen-Kennung, Startdateien, Startmenü.
# Deshalb gibt es KEINE Seiten für Benutzer, Sprache oder Tastatur.
---
modules-search: [ local ]

instances:
- id: livereste
  module: shellprocess
  config: shellprocess-livereste.conf

oem-setup: false
disable-cancel: false
disable-cancel-during-exec: true
quit-at-end: false

sequence:
- show:
  - welcome
  - partition
  - summary
- exec:
  - partition
  - mount
  - unpackfs
  - machineid
  - fstab
  - shellprocess@livereste
  - initramfscfg
  - initramfs
  - grubcfg
  - bootloader
  - umount
- show:
  - finished

branding: linuxmint
prompt-install: true
dont-chroot: false
